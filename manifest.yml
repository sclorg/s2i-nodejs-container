# Manifest for image directories creation
# every dest path will be prefixed by $DESTDIR/$version

# Files containing distgen directives
DISTGEN_RULES:
  - src: src/root/usr/share/container-scripts/nodejs/README.md
    dest: root/usr/share/container-scripts/nodejs/README.md

  - src: src/root/usr/share/container-scripts/nodejs/common.sh
    dest: root/usr/share/container-scripts/nodejs/common.sh

  - src: src/root/usr/bin/run-nodejs-slave
    dest: root/usr/bin/run-nodejs-slave
    mode: "0755"

  - src: src/root/usr/share/container-scripts/nodejs/openshift-custom-recovery.conf.template
    dest: root/usr/share/container-scripts/nodejs/openshift-custom-recovery.conf.template

  - src: src/root/usr/share/container-scripts/nodejs/openshift-custom-postgresql-replication.conf.template
    dest: root/usr/share/container-scripts/nodejs/openshift-custom-postgresql-replication.conf.template

# Files containing distgen directives, which are used for each
# (distro, version) combination not excluded in multispec
DISTGEN_MULTI_RULES:
  - src: src/Dockerfile
    dest: Dockerfile.rhel8

  - src: src/Dockerfile
    dest: Dockerfile.rhel9

  - src: src/Dockerfile
    dest: Dockerfile.rhel10

  - src: src/Dockerfile
    dest: Dockerfile.c9s

  - src: src/Dockerfile
    dest: Dockerfile.c10s

  - src: src/Dockerfile.fedora
    dest: Dockerfile.fedora

# Files to copy
COPY_RULES:
  - src: src/root/usr/libexec/fix-permissions
    dest: root/usr/libexec/fix-permissions
    mode: "0755"

  - src: src/root/usr/share/container-scripts/nodejs/openshift-custom-postgresql.conf.template
    dest: root/usr/share/container-scripts/nodejs/openshift-custom-postgresql.conf.template

  - src: src/root/usr/bin/run-nodejs
    dest: root/usr/bin/run-nodejs
    mode: "0755"

  - src: src/root/usr/bin/run-nodejs-master
    dest: root/usr/bin/run-nodejs-master
    mode: "0755"

  - src: src/root/usr/bin/container-entrypoint
    dest: root/usr/bin/container-entrypoint
    mode: "0755"

  - src: src/root/usr/bin/usage
    dest: root/usr/bin/usage
    mode: "0755"

  - src: src/root/usr/libexec/check-container
    dest: root/usr/libexec/check-container
    mode: "0755"

  - src: src/root/usr/share/container-scripts/nodejs/start/set_passwords.sh
    dest: root/usr/share/container-scripts/nodejs/start/set_passwords.sh

  - src: src/s2i/bin/assemble
    dest: s2i/bin/assemble
    mode: "0755"

  - src: src/s2i/bin/usage
    dest: s2i/bin/usage
    mode: "0755"

# Symbolic links
# This section is the last one on purpose because the generator.py
# does not allow dead symlinks.
SYMLINK_RULES:
  - src: root/usr/share/container-scripts/nodejs/README.md
    dest: README.md

  - src: ../test
    dest: test
